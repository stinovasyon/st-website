server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache immutable hashed assets forever
    location /_app/immutable/ {
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Short-lived cache for other static assets
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # No cache for HTML pages so updated deploys are picked up immediately
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Route all requests: try exact file, then directory index, then 404
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Serve a custom 404 page if one exists
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Disable access to dot-files
    location ~ /\. {
        deny all;
    }
}
